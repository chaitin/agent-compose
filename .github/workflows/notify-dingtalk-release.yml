name: Notify DingTalk release

on:
  workflow_run:
    workflows:
      - Images & Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to translate and send to DingTalk
        required: true
        type: string

permissions:
  contents: read

jobs:
  notify-dingtalk:
    name: Translate and notify DingTalk
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        startsWith(github.event.workflow_run.head_branch, 'v')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Translate release notes and send notification
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_TAG: ${{ github.event.workflow_run.head_branch }}
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
          DINGTALK_TARGETS: |
            [
              {
                "name": "release-primary",
                "webhook_env": "DINGTALK_WEBHOOK",
                "secret_env": "DINGTALK_SECRET"
              },
              {
                "name": "release-secondary",
                "webhook_env": "DINGTALK_WEBHOOK_2",
                "secret_env": "DINGTALK_SECRET_2"
              }
            ]
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          DINGTALK_WEBHOOK_2: ${{ secrets.DINGTALK_WEBHOOK_2 }}
          DINGTALK_SECRET_2: ${{ secrets.DINGTALK_SECRET_2 }}
          RELEASE_LLM_API_URL: ${{ secrets.RELEASE_LLM_API_URL }}
          RELEASE_LLM_API_KEY: ${{ secrets.RELEASE_LLM_API_KEY }}
          RELEASE_LLM_MODEL: ${{ secrets.RELEASE_LLM_MODEL }}
        run: |
          set -euo pipefail

          for variable in \
            RELEASE_LLM_API_URL \
            RELEASE_LLM_API_KEY \
            RELEASE_LLM_MODEL
          do
            if [[ -z "${!variable}" ]]; then
              echo "::error::GitHub Actions secret '$variable' is not configured"
              exit 1
            fi
          done

          if ! jq -e '
            type == "array" and
            length > 0 and
            all(.[]; (
              (.name | type == "string" and length > 0) and
              (.webhook_env | type == "string" and test("^[A-Za-z_][A-Za-z0-9_]*$")) and
              (.secret_env | type == "string" and test("^[A-Za-z_][A-Za-z0-9_]*$"))
            ))
          ' <<<"$DINGTALK_TARGETS" >/dev/null
          then
            echo "::error::DINGTALK_TARGETS must be a non-empty JSON array with name, webhook_env, and secret_env"
            exit 1
          fi

          target_count="$(jq 'length' <<<"$DINGTALK_TARGETS")"
          for ((target_index = 0; target_index < target_count; target_index++)); do
            target_name="$(jq -er --argjson index "$target_index" '.[$index].name' <<<"$DINGTALK_TARGETS")"
            webhook_variable="$(jq -er --argjson index "$target_index" '.[$index].webhook_env' <<<"$DINGTALK_TARGETS")"
            secret_variable="$(jq -er --argjson index "$target_index" '.[$index].secret_env' <<<"$DINGTALK_TARGETS")"

            if [[ -z "${!webhook_variable:-}" ]]; then
              echo "::error::DingTalk target '$target_name' references empty secret '$webhook_variable'"
              exit 1
            fi
            if [[ -z "${!secret_variable:-}" ]]; then
              echo "::error::DingTalk target '$target_name' references empty secret '$secret_variable'"
              exit 1
            fi
          done

          release_tag="${WORKFLOW_RUN_TAG:-}"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="${MANUAL_RELEASE_TAG:-}"
          fi
          if [[ -z "$release_tag" ]]; then
            echo "::error::A release tag is required"
            exit 1
          fi

          release_json="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}")"
          release_tag="$(jq -er '.tag_name' <<<"$release_json")"
          release_name="$(jq -er '.name // .tag_name' <<<"$release_json")"
          release_url="$(jq -er '.html_url' <<<"$release_json")"
          release_body="$(jq -r '.body // ""' <<<"$release_json")"

          if [[ -z "$release_body" ]]; then
            release_body="(This release has no release notes.)"
          fi

          temporary_response="$(mktemp)"
          trap 'rm -f "$temporary_response"' EXIT

          system_prompt='You turn GitHub release notes into a concise Simplified Chinese user-facing summary for a DingTalk notification. Output Markdown only, with no more than 12 bullets and approximately 1200 Chinese characters. Keep important user-visible changes: new features, bug fixes, performance, security, compatibility, breaking changes, runtime behavior, deployment, and installation changes. Omit routine documentation-only changes, CI workflow changes, tests, ordinary refactors, internal build housekeeping, generated-file updates, and other implementation details unless they materially affect users, compatibility, security, performance, deployment, or installation. Merge related entries into concise bullets, remove duplicates, and do not list every commit. Do not invent facts or claim changes that are not present in the input. Preserve exact version strings, important scope names, code identifiers, usernames, pull-request numbers, URLs, and Markdown links when retained. Use headings such as 功能、修复、性能与兼容性 only when the section is non-empty. Keep technical product names such as agent-compose, Docker, GitHub, API, CLI, LLM, Codex, Claude, Gemini, OpenCode, Jupyter, BoxLite, and Microsandbox unchanged.'

          request_body="$(jq -n \
            --arg model "$RELEASE_LLM_MODEL" \
            --arg system_prompt "$system_prompt" \
            --arg release_body "$release_body" \
            '{
              model: $model,
              temperature: 0.1,
              messages: [
                {role: "system", content: $system_prompt},
                {role: "user", content: ("Translate the following release notes:\n\n--- BEGIN RELEASE NOTES ---\n" + $release_body + "\n--- END RELEASE NOTES ---")}
              ]
            }')"

          if ! curl -fsS \
            --retry 2 \
            --connect-timeout 10 \
            --max-time 120 \
            -X POST \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${RELEASE_LLM_API_KEY}" \
            --data "$request_body" \
            "$RELEASE_LLM_API_URL" >"$temporary_response"
          then
            echo "::error::LLM request failed; check RELEASE_LLM_API_URL, RELEASE_LLM_API_KEY, and RELEASE_LLM_MODEL"
            exit 1
          fi

          translated_body="$(jq -er '.choices[0].message.content // empty' "$temporary_response" 2>/dev/null || true)"
          if [[ -z "$translated_body" ]]; then
            llm_error="$(jq -r '.error.message // "LLM response did not contain choices[0].message.content"' "$temporary_response" 2>/dev/null || true)"
            echo "::error::Release note translation failed: ${llm_error:-unknown error}"
            exit 1
          fi

          dingtalk_text="$(printf '### agent-compose %s 已发布\n\n**版本**：%s\n\n**变更内容**\n\n%s\n\n[查看 Release](%s)' \
            "$release_tag" \
            "$release_tag" \
            "$translated_body" \
            "$release_url")"

          dingtalk_payload="$(jq -n \
            --arg title "agent-compose ${release_tag} 已发布" \
            --arg text "$dingtalk_text" \
            '{msgtype: "markdown", markdown: {title: $title, text: $text}}')"

          for ((target_index = 0; target_index < target_count; target_index++)); do
            target_name="$(jq -er --argjson index "$target_index" '.[$index].name' <<<"$DINGTALK_TARGETS")"
            webhook_variable="$(jq -er --argjson index "$target_index" '.[$index].webhook_env' <<<"$DINGTALK_TARGETS")"
            secret_variable="$(jq -er --argjson index "$target_index" '.[$index].secret_env' <<<"$DINGTALK_TARGETS")"
            dingtalk_webhook="${!webhook_variable}"
            dingtalk_secret="${!secret_variable}"

            timestamp="$(date +%s)000"
            string_to_sign="$(printf '%s\n%s' "$timestamp" "$dingtalk_secret")"
            sign="$(printf '%s' "$string_to_sign" \
              | openssl dgst -sha256 -hmac "$dingtalk_secret" -binary \
              | base64 \
              | tr -d '\r\n')"
            encoded_sign="$(jq -rn --arg sign "$sign" '$sign | @uri')"

            separator='?'
            if [[ "$dingtalk_webhook" == *\?* ]]; then
              separator='&'
            fi
            signed_webhook="${dingtalk_webhook}${separator}timestamp=${timestamp}&sign=${encoded_sign}"

            if ! dingtalk_response="$(curl -fsS \
              --retry 3 \
              --connect-timeout 10 \
              --max-time 30 \
              -X POST \
              -H 'Content-Type: application/json' \
              --data "$dingtalk_payload" \
              "$signed_webhook")"
            then
              echo "::error::DingTalk HTTP request failed for target '$target_name'; check $webhook_variable and $secret_variable"
              exit 1
            fi

            dingtalk_error="$(jq -r 'if (.errcode // 0) == 0 then empty else (.errmsg // "unknown error") end' <<<"$dingtalk_response")"
            if [[ -n "$dingtalk_error" ]]; then
              echo "::error::DingTalk notification failed for target '$target_name': $dingtalk_error"
              exit 1
            fi

            echo "DingTalk notification sent to ${target_name} for ${release_name:-$release_tag}."
          done
