name: docker-multi-agent

workspaces:
  source:
    provider: local
    path: ./workspace

agents:
  reviewer:
    provider: codex
    system_prompt: Review changes and report risks.
    image: ghcr.io/chaitin/agent-compose-guest:latest
    driver:
      docker: {}
    workspace:
      name: source
  tester:
    provider: codex
    system_prompt: Run focused checks and report failures.
    image: ghcr.io/chaitin/agent-compose-guest:latest
    driver:
      docker: {}
    workspace:
      name: source
